<div class="border border-slate-200 rounded-xl transition-all duration-150 bg-white hover:border-slate-300"
     [class.hover:shadow-md]="!expanded()"
     [class.shadow-md]="expanded()">

  <!-- Clickable header row -->
  <button (click)="toggle()"
          class="w-full text-left px-5 py-4 focus:outline-none focus:ring-2 focus:ring-slate-300 rounded-xl">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0 flex-1">
        <h3 class="text-base font-semibold text-slate-800 m-0 truncate">{{ job().title ?? 'Untitled Role' }}</h3>
        <p class="text-sm text-slate-500 m-0 mt-0.5">{{ job().company ?? 'Unknown Company' }}</p>
      </div>
      <div class="flex-shrink-0 flex items-center gap-2">
        <mat-icon class="text-slate-400 transition-transform duration-200"
                  [class.rotate-180]="expanded()">
          expand_more
        </mat-icon>
      </div>
    </div>

    <!-- Details row (always visible) -->
    <div class="flex flex-wrap items-center gap-x-5 gap-y-1 text-sm text-slate-600 mt-3">
      <span class="inline-flex items-center gap-1.5">
        <mat-icon class="text-base text-slate-400">location_on</mat-icon>
        {{ job().location ?? 'Location TBD' }}
      </span>
      <span class="inline-flex items-center gap-1.5">
        <mat-icon class="text-base text-slate-400">payments</mat-icon>
        {{ formatSalary(job().salary) }}
      </span>
      @if (job().employmentType) {
        <span class="inline-flex items-center gap-1.5">
          <mat-icon class="text-base text-slate-400">work_history</mat-icon>
          {{ job().employmentType }}
        </span>
      }
      <span class="inline-flex items-center gap-1.5">
        <mat-icon class="text-base text-slate-400">calendar_today</mat-icon>
        Posted {{ formatDate(job().postedDate) }}
      </span>
    </div>
  </button>

  <!-- Expanded content -->
  @if (expanded()) {
    <div class="px-5 pb-5 border-t border-slate-100 mt-0">
      <div class="pt-4">
        <h4 class="text-sm font-medium text-slate-700 mb-2">Job Description</h4>
        <p class="text-sm text-slate-600 leading-relaxed whitespace-pre-line m-0">
          {{ job().description ?? 'No description available.' }}
        </p>
      </div>
      <div class="mt-4">
        <a [href]="job().url"
           target="_blank"
           rel="noopener noreferrer"
           class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg
                  bg-slate-800 hover:bg-slate-700 text-white transition-colors duration-150">
          <mat-icon class="text-base">open_in_new</mat-icon>
          View on Reed.co.uk
        </a>
      </div>
    </div>
  }

</div>
